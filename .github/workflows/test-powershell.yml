name: Test PowerShell

on:
    push:
        branches:
            - master
        paths-ignore:
            - '*.md'
            - 'docs/**'
            - '.gitignore'
    pull_request:
        branches:
            - master
    workflow_dispatch:

permissions:
    contents: read

env:
    DOTNET_VERSION: '8.x'
    BUILD_CONFIGURATION: 'Debug'

jobs:
    refresh-psd1:
        name: 'Refresh PSD1'
        runs-on: windows-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup PowerShell modules
              shell: pwsh
              run: |
                  Install-Module PSPublishModule -MinimumVersion 3.0.55 -Force -Scope CurrentUser -AllowClobber

            - name: Refresh DbaClientX module manifest
              shell: pwsh
              run: |
                  ./Module/Build/Build-Module.ps1 -RunMode Manifest

            - name: Refresh FabricClientX module manifest
              shell: pwsh
              run: |
                  ./Module-FabricClientX/Build/Build-Module.ps1 -RunMode Manifest

            - name: Upload refreshed module entry files
              uses: actions/upload-artifact@v7
              with:
                  name: module-entry
                  path: |
                      Module/DbaClientX.psd1
                      Module/DbaClientX.psm1
                      Module/DbaClientX.Libraries.ps1
                      Module-FabricClientX/FabricClientX.psd1
                      Module-FabricClientX/FabricClientX.psm1
                      Module-FabricClientX/FabricClientX.Libraries.ps1

    test-windows-ps5:
        needs: refresh-psd1
        name: 'Windows PowerShell 5.1'
        runs-on: windows-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Download refreshed module entry files
              uses: actions/download-artifact@v8
              with:
                  name: module-entry
                  path: .

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Install PowerShell modules
              shell: powershell
              run: |
                  Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"
                  if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
                      Register-PSRepository -Default
                  }
                  Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
                  Install-Module -Name Pester -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber
                  Install-Module -Name PSWriteColor -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber

            - name: Build .NET solution
              run: |
                  dotnet restore DbaClientX.sln
                  dotnet build DbaClientX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run DbaClientX PowerShell tests
              shell: powershell
              run: ./Module/DbaClientX.Tests.ps1

            - name: Run FabricClientX PowerShell tests
              shell: powershell
              run: ./Module-FabricClientX/FabricClientX.Tests.ps1

    test-windows-ps7:
        needs: refresh-psd1
        name: 'Windows PowerShell 7'
        runs-on: windows-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Download refreshed module entry files
              uses: actions/download-artifact@v8
              with:
                  name: module-entry
                  path: .

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Install PowerShell modules
              shell: pwsh
              run: |
                  Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"
                  if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
                      Register-PSRepository -Default
                  }
                  Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
                  Install-Module -Name Pester -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber
                  Install-Module -Name PSWriteColor -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber

            - name: Build .NET solution
              run: |
                  dotnet restore DbaClientX.sln
                  dotnet build DbaClientX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run DbaClientX PowerShell tests
              shell: pwsh
              run: ./Module/DbaClientX.Tests.ps1

            - name: Run FabricClientX PowerShell tests
              shell: pwsh
              run: ./Module-FabricClientX/FabricClientX.Tests.ps1

    test-packaged-alc-ps7:
        name: 'Windows PowerShell 7 Packaged ALC'
        runs-on: windows-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Install PowerShell modules
              shell: pwsh
              run: |
                  Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"
                  if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
                      Register-PSRepository -Default
                  }
                  Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
                  Install-Module -Name PSPublishModule -Repository PSGallery -MinimumVersion 3.0.55 -Force -SkipPublisherCheck -AllowClobber
                  Install-Module -Name Pester -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber
                  Install-Module -Name PSWriteColor -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber

            - name: Build packaged DbaClientX module
              shell: pwsh
              run: ./Module/Build/Build-Module.ps1 -RunMode Build -SignModule:$false

            - name: Build packaged FabricClientX module
              shell: pwsh
              run: ./Module-FabricClientX/Build/Build-Module.ps1 -RunMode Build -SignModule:$false

            - name: Run packaged DbaClientX ALC smoke test
              shell: pwsh
              env:
                  DBACLIENTX_REQUIRE_ALC_SMOKE: 'true'
              run: |
                  Import-Module Pester -Force
                  Invoke-Pester -Path ./Module/Tests/AssemblyLoadContext.Tests.ps1 -Tag PackagedALC -Output Detailed

            - name: Run packaged FabricClientX ALC smoke test
              shell: pwsh
              env:
                  FABRICCLIENTX_REQUIRE_ALC_SMOKE: 'true'
              run: |
                  Import-Module Pester -Force
                  Invoke-Pester -Path ./Module-FabricClientX/Tests/AssemblyLoadContext.Tests.ps1 -Tag PackagedALC -Output Detailed

            - name: Test packaged coexistence on PowerShell 7 (DbaClientX first)
              shell: pwsh
              env:
                  FABRICCLIENTX_REQUIRE_COEXISTENCE_SMOKE: 'true'
                  FABRICCLIENTX_IMPORT_ORDER: DbaFirst
              run: |
                  Import-Module Pester -Force
                  Invoke-Pester -Path ./Module-FabricClientX/Tests/ModuleCoexistence.Tests.ps1 -Tag PackagedCoexistence -Output Detailed

            - name: Test packaged coexistence on PowerShell 7 (FabricClientX first)
              shell: pwsh
              env:
                  FABRICCLIENTX_REQUIRE_COEXISTENCE_SMOKE: 'true'
                  FABRICCLIENTX_IMPORT_ORDER: FabricFirst
              run: |
                  Import-Module Pester -Force
                  Invoke-Pester -Path ./Module-FabricClientX/Tests/ModuleCoexistence.Tests.ps1 -Tag PackagedCoexistence -Output Detailed

            - name: Test packaged coexistence on Windows PowerShell 5.1 (DbaClientX first)
              shell: powershell
              env:
                  FABRICCLIENTX_REQUIRE_COEXISTENCE_SMOKE: 'true'
                  FABRICCLIENTX_IMPORT_ORDER: DbaFirst
              run: |
                  Import-Module Pester -Force
                  Invoke-Pester -Path ./Module-FabricClientX/Tests/ModuleCoexistence.Tests.ps1 -Tag PackagedCoexistence -Output Detailed

            - name: Test packaged coexistence on Windows PowerShell 5.1 (FabricClientX first)
              shell: powershell
              env:
                  FABRICCLIENTX_REQUIRE_COEXISTENCE_SMOKE: 'true'
                  FABRICCLIENTX_IMPORT_ORDER: FabricFirst
              run: |
                  Import-Module Pester -Force
                  Invoke-Pester -Path ./Module-FabricClientX/Tests/ModuleCoexistence.Tests.ps1 -Tag PackagedCoexistence -Output Detailed

    test-ubuntu:
        needs: refresh-psd1
        name: 'Ubuntu PowerShell 7'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Download refreshed module entry files
              uses: actions/download-artifact@v8
              with:
                  name: module-entry
                  path: .

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Install PowerShell
              run: |
                  curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
                  curl https://packages.microsoft.com/config/ubuntu/20.04/prod.list | sudo tee /etc/apt/sources.list.d/microsoft.list
                  sudo apt-get update
                  sudo apt-get install -y powershell

            - name: Install PowerShell modules
              shell: pwsh
              run: |
                  Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"
                  if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
                      Register-PSRepository -Default
                  }
                  Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
                  Install-Module -Name Pester -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber
                  Install-Module -Name PSWriteColor -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber

            - name: Build .NET solution
              run: |
                  dotnet restore DbaClientX.sln
                  dotnet build DbaClientX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run DbaClientX PowerShell tests
              shell: pwsh
              run: ./Module/DbaClientX.Tests.ps1

            - name: Run FabricClientX PowerShell tests
              shell: pwsh
              run: ./Module-FabricClientX/FabricClientX.Tests.ps1

    test-macos:
        needs: refresh-psd1
        name: 'macOS PowerShell 7'
        runs-on: macos-latest
        timeout-minutes: 10
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Download refreshed module entry files
              uses: actions/download-artifact@v8
              with:
                  name: module-entry
                  path: .

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Install PowerShell
              run: |
                  if command -v pwsh >/dev/null 2>&1; then
                      pwsh --version
                  else
                      brew install --cask powershell/tap/powershell
                  fi

            - name: Install PowerShell modules
              shell: pwsh
              run: |
                  Write-Host "PowerShell Version: $($PSVersionTable.PSVersion)"
                  if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
                      Register-PSRepository -Default
                  }
                  Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
                  Install-Module -Name Pester -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber
                  Install-Module -Name PSWriteColor -Repository PSGallery -Force -SkipPublisherCheck -AllowClobber

            - name: Build .NET solution
              run: |
                  dotnet restore DbaClientX.sln
                  dotnet build DbaClientX.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

            - name: Run DbaClientX PowerShell tests
              shell: pwsh
              run: ./Module/DbaClientX.Tests.ps1

            - name: Run FabricClientX PowerShell tests
              shell: pwsh
              run: ./Module-FabricClientX/FabricClientX.Tests.ps1
